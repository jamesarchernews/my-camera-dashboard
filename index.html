<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL CAM MONITOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>SYSTEM MONITOR // ACTIVE</h1>
        <button onclick="toggleSetup()">CONFIG</button>
    </div>

    <div id="setup-panel" class="hidden">
        <input type="text" id="ip1" placeholder="Enter IP 1 (e.g. 162.119.248.192)">
        <input type="text" id="ip2" placeholder="Enter IP 2">
        <input type="text" id="ip3" placeholder="Enter IP 3">
        <input type="text" id="ip4" placeholder="Enter IP 4">
        <button onclick="applyIPs()">BOOT FEEDS</button>
    </div>

    <div class="grid">
        <div class="card" onclick="zoom(this)">
            <div class="rec-dot">REC</div>
            <iframe id="cam1"></iframe>
            <div class="tag">CH-01</div>
        </div>
        <div class="card" onclick="zoom(this)">
            <div class="rec-dot">REC</div>
            <iframe id="cam2"></iframe>
            <div class="tag">CH-02</div>
        </div>
        <div class="card" onclick="zoom(this)">
            <div class="rec-dot">REC</div>
            <iframe id="cam3"></iframe>
            <div class="tag">CH-03</div>
        </div>
        <div class="card" onclick="zoom(this)">
            <div class="rec-dot">REC</div>
            <iframe id="cam4"></iframe>
            <div class="tag">CH-04</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
